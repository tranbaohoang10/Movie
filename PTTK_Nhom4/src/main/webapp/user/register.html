<!-- register.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - CineTicket</title>
    <link rel="stylesheet" href="../assets/css/user/style.css?v=2.7">
    <link rel="stylesheet" href="../assets/css/user/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/user/forgot-password.css">
</head>
<body class="auth-body">
<div id="toast-container"></div>
<div class="auth-container">
    <h2>ĐĂNG KÝ THÀNH VIÊN</h2>
    <form id="registerForm">
        <div class="form-group">
            <input type="text" placeholder="Họ và tên" required>
        </div>
        <div class="form-group">
            <input type="email" placeholder="Email của bạn" required>
        </div>
        <div class="form-group">
            <input type="password" placeholder="Mật khẩu" required minlength="6">
        </div>
        <div class="form-group">
            <input type="password" placeholder="Xác nhận mật khẩu" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary auth-btn">Tạo Tài Khoản</button>
    </form>
    <div class="auth-links">
        <p>Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
        <p  class="user-ext-46" ><a href="index.html"  class="text-muted" >← Trở về trang chủ</a></p>
    </div>
</div>
<script>
    function showToast(message, type = 'info', duration = 3000) {
        const container = document.getElementById('toast-container');
        const icons = {
            success: '<i class="fas fa-check-circle toast-icon"></i>',
            error:   '<i class="fas fa-times-circle toast-icon"></i>',
            info:    '<i class="fas fa-info-circle toast-icon"></i>'
        };
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerHTML = `${icons[type] || icons.info}<span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
            toast.classList.add('toast-out');
            toast.addEventListener('animationend', () => toast.remove());
        }, duration);
    }

    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const inputs = document.querySelectorAll('input[type="password"]');
        if (inputs[0].value !== inputs[1].value) {
            showToast('Mật khẩu xác nhận không khớp!', 'error', 800);
            return;
        }
        showToast('Đăng ký thành công! Vui lòng đăng nhập.', 'success', 800);
        setTimeout(() => { window.location.href = 'login.html'; }, 800);
    });
</script>
<script src="../assets/js/app.js"></script>
</body>
</html>
