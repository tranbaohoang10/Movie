<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - CineTicket</title>
    <link rel="stylesheet" href="../assets/css/user/style.css?v=2.7">
    <link rel="stylesheet" href="../assets/css/user/login.css">
    <link rel="stylesheet" href="../assets/css/user/forgot-password.css">
</head>

<body class="auth-body">
<div id="toast-container"></div>

<div class="auth-container">
    <h2>LẤY LẠI MẬT KHẨU</h2>
    <form id="forgotPasswordForm">
        <div id="step1">
            <div class="form-group">
                <input type="email" placeholder="Nhập Email đã đăng ký" required>
            </div>
            <button type="button" id="btnGetCode" class="btn btn-primary auth-btn">Gửi Mã Xác Thực</button>
        </div>

        <div id="step2" style="display: none;">
            <p style="text-align:center; color:#bbb; font-size:0.9rem; margin-bottom:18px;">Nhập mã OTP gồm 6 số đã
                được gửi về email</p>
            <div class="otp-group">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
                <input class="otp-box" type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
            </div>
            <button type="button" id="btnVerifyCode" class="btn btn-primary auth-btn">Xác nhận OTP</button>
        </div>

        <div id="step3" style="display: none;">
            <div class="form-group">
                <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới" required>
            </div>
            <div class="form-group">
                <input type="password" id="confirmPassword" placeholder="Xác nhận mật khẩu mới" required>
            </div>
            <button type="submit" class="btn btn-primary auth-btn">Hoàn thành</button>
        </div>
    </form>
    <div class="auth-links">
        <p>Nhớ mật khẩu? <a href="login.html">Đăng nhập</a></p>
        <p class="user-ext-46"><a href="index.html" class="text-muted">← Trở về trang chủ</a></p>
    </div>
</div>

<script>
    function showToast(message, type = 'info', duration = 800) {
        const container = document.getElementById('toast-container');
        const icons = {
            success: '<i class="fas fa-check-circle toast-icon"></i>',
            error: '<i class="fas fa-times-circle toast-icon"></i>',
            info: '<i class="fas fa-envelope toast-icon"></i>'
        };
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerHTML = `${icons[type] || icons.info}<span>${message}</span>`;
        container.appendChild(toast);

        setTimeout(() => {
            toast.classList.add('toast-out');
            toast.addEventListener('animationend', () => toast.remove());
        }, duration);
    }

    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    const btnGetCode = document.getElementById('btnGetCode');
    const btnVerifyCode = document.getElementById('btnVerifyCode');
    const form = document.getElementById('forgotPasswordForm');

    btnGetCode.addEventListener('click', function () {
        const emailInput = step1.querySelector('input[type="email"]');
        if (emailInput.checkValidity()) {
            step1.style.display = 'none';
            step2.style.display = 'block';
            showToast('Đã gửi email thành công!', 'info', 800);
        } else {
            emailInput.reportValidity();
        }
    });

    const otpBoxes = document.querySelectorAll('.otp-box');
    otpBoxes.forEach((box, idx) => {
        box.addEventListener('input', function () {
            this.value = this.value.replace(/[^0-9]/g, '');
            if (this.value) {
                this.classList.add('filled');
                if (idx < otpBoxes.length - 1) otpBoxes[idx + 1].focus();
            } else {
                this.classList.remove('filled');
            }
        });
        box.addEventListener('keydown', function (e) {
            if (e.key === 'Backspace' && !this.value && idx > 0) {
                otpBoxes[idx - 1].focus();
                otpBoxes[idx - 1].value = '';
                otpBoxes[idx - 1].classList.remove('filled');
            }
        });
        box.addEventListener('paste', function (e) {
            e.preventDefault();
            const pasted = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '').slice(0, 6);
            pasted.split('').forEach((ch, i) => {
                if (otpBoxes[i]) {
                    otpBoxes[i].value = ch;
                    otpBoxes[i].classList.add('filled');
                }
            });
            const nextEmpty = [...otpBoxes].findIndex(b => !b.value);
            if (nextEmpty !== -1) otpBoxes[nextEmpty].focus();
            else otpBoxes[5].focus();
        });
    });

    btnVerifyCode.addEventListener('click', function () {
        const otp = [...otpBoxes].map(b => b.value).join('');
        if (otp.length === 6) {
            step2.style.display = 'none';
            step3.style.display = 'block';
        } else {
            showToast('Vui lòng nhập đầy đủ 6 số OTP.', 'error', 800);
            const firstEmpty = [...otpBoxes].find(b => !b.value);
            if (firstEmpty) firstEmpty.focus();
        }
    });

    form.addEventListener('submit', function (e) {
        e.preventDefault();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        if (newPassword !== confirmPassword) {
            showToast('Mật khẩu xác nhận không khớp! Vui lòng nhập lại.', 'error', 800);
            return;
        }
        showToast('Cập nhật mật khẩu thành công!', 'success', 800);
        setTimeout(() => { window.location.href = 'login.html'; }, 800);
    });
</script>
<script src="../assets/js/app.js"></script>
</body>

</html>
